<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Brew - Contact</title>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About us</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <main>
      <h1>Contact us</h1>
      <address>
        <ul>
          <li>18 Larchmont Avenue, Los Angeles, CA 90004</li>
          <li>Phone: <a href="tel:01234 56789">01234 56789</a></li>
        </ul>
      </address>
      <div>
        <img src="https://images.pexels.com/photos/9715331/pexels-photo-9715331.jpeg" alt="A hot cup of coffee with steam on a wooden table in warm morning light." height="400" />
      </div>
      <div>
        <form action="#" method="dialog">
          <fieldset>
            <legend>Send us a message</legend>
            <p>
              <label for="name">Name</label>
              <input type="text" id="name" />
            </p>
            <p>
              <label for="email">Email</label>
              <input type="email" id="email" />
            </p>
            <p>
              <label for="message">Message</label>
              <textarea id="message"></textarea>
            </p>
            <button type="submit">Submit</button>
          </fieldset>
        </form>
      </div>
    </main>
  </body>
</html>
